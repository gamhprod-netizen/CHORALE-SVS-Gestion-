<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chorale — Carnet de Gestion</title>
  <meta name="description" content="Système de gestion complet de la chorale : membres, présences, cotisations, évaluations, anniversaires. Synchronisé en temps réel.">

  <meta name="theme-color" content="#7A2E2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chorale">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
/* ════════════════════════════════════════════════════════════════
   CARNET DE CHŒUR — Design System
   Palette : crème missel, bordeaux profond, or liturgique, sauge
   Typographie : serif display (titres) + sans-serif (données)
   ════════════════════════════════════════════════════════════════ */

:root {
  --cream:       #FAF6EE;
  --cream-deep:  #F0E9D8;
  --paper:       #FFFDF8;
  --maroon:      #7A2E2E;
  --maroon-dark: #5C2222;
  --maroon-soft: #F3E2E2;
  --gold:        #C9A227;
  --gold-soft:   #FAF1D6;
  --sage:        #4A6B57;
  --sage-soft:   #E3ECE6;
  --ink:         #2B2622;
  --ink-soft:    #6B635A;
  --line:        #E2D9C8;
  --red:         #B23A3A;
  --red-soft:    #F7E2E2;
  --green:       #4A7A52;
  --green-soft:  #E3EFE5;
  --amber:       #B8860B;
  --amber-soft:  #FAF0D7;
  --blue:        #3D6B8A;
  --blue-soft:   #E1ECF2;
  --purple:      #6B4E8E;
  --purple-soft: #ECE4F4;

  --radius-s: 8px;
  --radius-m: 14px;
  --radius-l: 22px;

  --shadow-card: 0 2px 10px rgba(122,46,46,0.07), 0 1px 2px rgba(122,46,46,0.06);
  --shadow-pop:  0 8px 28px rgba(43,38,34,0.16);

  --font-display: 'Fraunces', 'Georgia', serif;
  --font-body:    'Inter', -apple-system, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  overscroll-behavior-y: contain;
  padding-bottom: env(safe-area-inset-bottom);
}

#app {
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--cream);
  position: relative;
}

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-dark) 100%);
  color: var(--gold-soft);
  padding: 18px 18px 22px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow-card);
}
.app-header__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.app-header__title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  display: flex; align-items: center; gap: 8px;
}
.app-header__title .ornament { font-size: 1.1rem; color: var(--gold); }
.app-header__year {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(250,241,214,0.65);
  border: 1px solid rgba(250,241,214,0.3);
  border-radius: 999px;
  padding: 3px 10px;
  font-weight: 600;
}
.app-header__subtitle { margin-top: 4px; font-size: 0.82rem; color: rgba(250,241,214,0.7); }
.app-header::after {
  content: '';
  display: block;
  position: absolute;
  bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 90%;
  height: 1px;
  background: repeating-linear-gradient(90deg, var(--gold) 0 6px, transparent 6px 12px);
  opacity: 0.5;
}

.app-main { flex: 1; padding: 16px 14px 90px; }

/* ── Bottom nav ── */
.app-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  max-width: 560px;
  margin: 0 auto;
  background: var(--paper);
  border-top: 1px solid var(--line);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -2px 10px rgba(43,38,34,0.06);
}
.app-nav::-webkit-scrollbar { display: none; }
.nav-item {
  flex: 0 0 auto;
  min-width: 64px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 9px 10px 7px;
  font-size: 0.62rem;
  color: var(--ink-soft);
  border: none; background: none;
  font-weight: 600; letter-spacing: 0.01em;
  cursor: pointer; position: relative;
  transition: color 0.15s;
}
.nav-item__icon { font-size: 1.25rem; line-height: 1; }
.nav-item.active { color: var(--maroon); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 3px;
  background: var(--gold);
  border-radius: 0 0 3px 3px;
}
.nav-item .badge {
  position: absolute;
  top: 4px; right: 6px;
  background: var(--red);
  color: #fff;
  font-size: 0.55rem;
  font-weight: 700;
  border-radius: 999px;
  min-width: 15px; height: 15px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px;
}

/* ── Sections / cards ── */
.section-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--maroon);
  margin: 22px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-title:first-child { margin-top: 4px; }
.section-title .ornament { color: var(--gold); font-size: 1rem; }

.card {
  background: var(--paper);
  border-radius: var(--radius-m);
  padding: 14px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--line);
  margin-bottom: 10px;
}

.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 4px; }
.kpi-card {
  background: var(--paper);
  border-radius: var(--radius-m);
  padding: 12px 8px;
  text-align: center;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-card);
}
.kpi-card__value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--maroon); line-height: 1.1; }
.kpi-card__label { font-size: 0.65rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; font-weight: 600; }
.kpi-card.accent-gold .kpi-card__value { color: var(--amber); }
.kpi-card.accent-sage .kpi-card__value { color: var(--sage); }
.kpi-card.accent-red  .kpi-card__value { color: var(--red); }
.kpi-card.accent-blue .kpi-card__value { color: var(--blue); }
.kpi-card.accent-purple .kpi-card__value { color: var(--purple); }

.alert-banner {
  border-radius: var(--radius-m);
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 0.86rem;
  border: 1px solid;
}
.alert-banner__icon { font-size: 1.2rem; line-height: 1; }
.alert-banner.warn   { background: var(--amber-soft); border-color: #E8D49A; color: #7A5C0A; }
.alert-banner.danger { background: var(--red-soft);   border-color: #E4B8B8; color: var(--maroon-dark); }
.alert-banner.info   { background: var(--blue-soft);  border-color: #BFD6E4; color: #2C4F66; }
.alert-banner.success{ background: var(--green-soft); border-color: #C3DEC8; color: #2E5536; }
.alert-banner.gold   { background: var(--gold-soft); border-color: #EBD9A0; color: #7A5C0A; }
.alert-banner b { font-weight: 700; }

.list { background: var(--paper); border-radius: var(--radius-m); border: 1px solid var(--line); overflow: hidden; box-shadow: var(--shadow-card); }
.list-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.12s; }
.list-row:last-child { border-bottom: none; }
.list-row:active { background: var(--cream-deep); }
.list-row__avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--maroon-soft); color: var(--maroon);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; flex-shrink: 0;
}
.list-row__body { flex: 1; min-width: 0; }
.list-row__title { font-weight: 600; font-size: 0.92rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-row__subtitle { font-size: 0.76rem; color: var(--ink-soft); margin-top: 1px; }
.list-row__meta { text-align: right; font-size: 0.78rem; color: var(--ink-soft); flex-shrink: 0; }
.list-row__chevron { color: var(--line); font-size: 1.1rem; }

.pill { display: inline-flex; align-items: center; gap: 4px; font-size: 0.68rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; letter-spacing: 0.02em; }
.pill.bureau   { background: var(--gold-soft); color: #8A6D10; }
.pill.choriste { background: var(--blue-soft); color: #2C4F66; }
.pill.integrant{ background: var(--purple-soft); color: #4D3870; }
.pill.actif    { background: var(--green-soft); color: #2E5536; }
.pill.suspendu { background: var(--red-soft); color: var(--maroon-dark); }
.pill.exemplaire { background: var(--green-soft); color: #2E5536; }
.pill.accompagner { background: var(--red-soft); color: var(--maroon-dark); }

.tabbar { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.tabbar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 0 0 auto; padding: 7px 14px; border-radius: 999px;
  border: 1px solid var(--line); background: var(--paper); color: var(--ink-soft);
  font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.tab-btn.active { background: var(--maroon); color: var(--gold-soft); border-color: var(--maroon); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 18px; border-radius: var(--radius-s); border: none;
  font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: transform 0.08s, opacity 0.15s;
  font-family: var(--font-body);
}
.btn:active { transform: scale(0.97); }
.btn.primary { background: var(--maroon); color: var(--gold-soft); }
.btn.secondary { background: var(--cream-deep); color: var(--ink); border: 1px solid var(--line); }
.btn.gold { background: var(--gold); color: var(--maroon-dark); }
.btn.sage { background: var(--sage); color: #fff; }
.btn.ghost { background: transparent; color: var(--maroon); border: 1px solid var(--maroon-soft); }
.btn.danger { background: var(--red-soft); color: var(--maroon-dark); }
.btn.block { width: 100%; }
.btn.sm { padding: 7px 12px; font-size: 0.78rem; }
.btn:disabled { opacity: 0.5; pointer-events: none; }

.fab {
  position: fixed; bottom: 76px; right: 18px; max-width: 560px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--maroon); color: var(--gold-soft); border: none;
  font-size: 1.6rem; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-pop); z-index: 90; cursor: pointer;
}
.fab:active { transform: scale(0.94); }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--ink-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 12px; border-radius: var(--radius-s);
  border: 1px solid var(--line); background: var(--paper);
  font-family: var(--font-body); font-size: 0.92rem; color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--maroon); outline-offset: 1px; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius-m);
  padding: 10px 14px; margin-bottom: 14px;
}
.search-bar input { border: none; outline: none; background: none; flex: 1; font-size: 0.9rem; color: var(--ink); font-family: var(--font-body); }
.search-bar__icon { color: var(--ink-soft); }

.sheet-overlay { position: fixed; inset: 0; background: rgba(43,38,34,0.45); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.sheet {
  background: var(--cream); border-radius: 20px 20px 0 0; max-width: 560px; width: 100%;
  max-height: 88vh; overflow-y: auto; padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
  animation: sheet-up 0.22s ease-out;
}
@keyframes sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet__handle { width: 36px; height: 4px; background: var(--line); border-radius: 999px; margin: 0 auto 14px; }
.sheet__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sheet__title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--maroon); }
.sheet__close { background: var(--cream-deep); border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; color: var(--ink-soft); cursor: pointer; }

.scroll-table { overflow-x: auto; border-radius: var(--radius-m); border: 1px solid var(--line); background: var(--paper); }
.scroll-table table { border-collapse: collapse; width: 100%; font-size: 0.78rem; }
.scroll-table th, .scroll-table td { padding: 8px 10px; border-bottom: 1px solid var(--line); text-align: center; white-space: nowrap; }
.scroll-table th { background: var(--cream-deep); color: var(--maroon); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.03em; position: sticky; top: 0; }
.scroll-table td:first-child, .scroll-table th:first-child { position: sticky; left: 0; background: var(--paper); text-align: left; font-weight: 600; z-index: 2; box-shadow: 2px 0 4px rgba(0,0,0,0.04); }
.scroll-table th:first-child { background: var(--cream-deep); z-index: 3; }
.scroll-table tr:nth-child(even) td:first-child { background: var(--cream); }

.status-select { font-size: 0.7rem; border: 1px solid var(--line); border-radius: 6px; padding: 4px 4px; background: var(--paper); width: 100%; text-align: center; }
.status-present  { background: var(--green-soft) !important; color: #2E5536; }
.status-abs-nj   { background: var(--red-soft) !important; color: var(--maroon-dark); }
.status-abs-j    { background: var(--gold-soft) !important; color: #8A6D10; }
.status-ret-nj   { background: #FCE4D6 !important; color: #9C4A0F; }
.status-ret-j    { background: var(--blue-soft) !important; color: #2C4F66; }
.status-voyage   { background: var(--purple-soft) !important; color: #4D3870; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--ink-soft); }
.empty-state__icon { font-size: 2.4rem; margin-bottom: 8px; }
.empty-state__text { font-size: 0.88rem; }

.progress { height: 8px; background: var(--cream-deep); border-radius: 999px; overflow: hidden; }
.progress__fill { height: 100%; border-radius: 999px; transition: width 0.3s; }

.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--ink); color: var(--cream); padding: 10px 20px; border-radius: 999px;
  font-size: 0.82rem; font-weight: 600; z-index: 300; box-shadow: var(--shadow-pop);
  animation: toast-pop 2.6s ease forwards; white-space: nowrap;
}
@keyframes toast-pop {
  0% { opacity: 0; transform: translate(-50%, 10px); }
  10% { opacity: 1; transform: translate(-50%, 0); }
  85% { opacity: 1; }
  100% { opacity: 0; transform: translate(-50%, 0); }
}

.flex-between { display: flex; align-items: center; justify-content: space-between; }
.text-muted { color: var(--ink-soft); }
.text-sm { font-size: 0.8rem; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.divider { height: 1px; background: var(--line); margin: 14px 0; }
.font-display { font-family: var(--font-display); }
.center { text-align: center; }

.install-banner {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  max-width: 520px; width: calc(100% - 28px);
  background: var(--maroon); color: var(--gold-soft); border-radius: var(--radius-m);
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  z-index: 400; box-shadow: var(--shadow-pop); font-size: 0.82rem;
}
.install-banner button { margin-left: auto; background: var(--gold); color: var(--maroon-dark); border: none; padding: 7px 12px; border-radius: 8px; font-weight: 700; font-size: 0.76rem; cursor: pointer; }
.install-banner .dismiss { background: none; color: rgba(250,241,214,0.6); padding: 7px 6px; }


/* ════════════════════════════════════════════════════════════════
   AUTH SCREEN
   ════════════════════════════════════════════════════════════════ */
.auth-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(160deg, var(--maroon) 0%, var(--maroon-dark) 60%, #3D1717 100%);
}
.auth-card {
  background: var(--paper);
  border-radius: var(--radius-l);
  padding: 32px 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-pop);
  text-align: center;
}
.auth-logo {
  font-size: 2.6rem;
  margin-bottom: 6px;
}
.auth-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--maroon);
  margin-bottom: 4px;
}
.auth-subtitle {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-bottom: 22px;
}
.auth-error {
  background: var(--red-soft);
  color: var(--maroon-dark);
  border: 1px solid #E4B8B8;
  border-radius: var(--radius-s);
  padding: 10px 12px;
  font-size: 0.82rem;
  margin-bottom: 14px;
  text-align: left;
}
.auth-card .field { text-align: left; margin-bottom: 14px; }
.auth-card #auth-submit { margin-top: 4px; }
.auth-links {
  font-size: 0.82rem;
  color: var(--ink-soft);
  margin-top: 14px;
}
.auth-links a {
  color: var(--maroon);
  font-weight: 700;
  text-decoration: none;
  margin-left: 4px;
}
.auth-divider {
  height: 1px;
  background: var(--line);
  margin: 16px 0;
}
.auth-footer {
  margin-top: 22px;
  font-size: 0.74rem;
  color: rgba(250,241,214,0.65);
  text-align: center;
}

/* ════════════════════════════════════════════════════════════════
   SYNC STATUS INDICATOR + USER MENU (header)
   ════════════════════════════════════════════════════════════════ */
.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sync-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #5CC97A;
  box-shadow: 0 0 0 0 rgba(92,201,122,0.6);
  animation: sync-pulse 2s infinite;
  flex-shrink: 0;
}
.sync-dot.offline {
  background: #D9534F;
  animation: none;
}
.sync-dot.syncing {
  background: var(--gold);
}
@keyframes sync-pulse {
  0% { box-shadow: 0 0 0 0 rgba(92,201,122,0.5); }
  70% { box-shadow: 0 0 0 6px rgba(92,201,122,0); }
  100% { box-shadow: 0 0 0 0 rgba(92,201,122,0); }
}
.user-btn {
  background: rgba(250,241,214,0.12);
  border: 1px solid rgba(250,241,214,0.25);
  color: var(--gold-soft);
  border-radius: 999px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: var(--font-display);
}
.sync-status-text {
  font-size: 0.68rem;
  color: rgba(250,241,214,0.65);
  display: flex;
  align-items: center;
  gap: 5px;
}

  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
// ════════════════════════════════════════════════════════════════
// FIREBASE API — Initialisation, Auth, Firestore helpers
// ════════════════════════════════════════════════════════════════
// Chargé en tant que <script type="module">. Utilise des imports
// dynamiques (import()) afin de pouvoir capturer les erreurs réseau
// (CDN bloqué, etc.) avec un try/catch — ce qui n'est pas possible
// avec des imports statiques.

window.FirebaseAPI = {
  app: null,
  auth: null,
  db: null,
  helpers: null,
  _fns: null,

  async init(config) {
    const FB_VERSION = "10.13.0";
    const base = `https://www.gstatic.com/firebasejs/${FB_VERSION}`;

    const [appMod, authMod, fsMod] = await Promise.all([
      import(`${base}/firebase-app.js`),

// ===== STORE (Firestore) =====
// ════════════════════════════════════════════════════════════════
// STORE — Gestion centralisée des données + synchronisation Firestore
// ════════════════════════════════════════════════════════════════
//
// Architecture : toutes les données de l'application vivent dans
// Store.data (même structure que la version locale). Ce store est
// synchronisé en temps réel avec un document Firestore unique
// (chorale/data). Chaque appel à Store.save() écrit ce document ;
// chaque changement distant (autre utilisateur) déclenche un
// onSnapshot qui met à jour Store.data et redessine l'écran courant.
// ════════════════════════════════════════════════════════════════

const FIRESTORE_DOC = { collection: 'chorale', doc: 'data' };

const Store = {
  data: null,
  _db: null,
  _docRef: null,
  _unsubscribe: null,
  _saving: false,        // true while we are writing (avoid feedback loop)
  _ready: false,
  _onRemoteUpdate: null,  // callback set by app.js to re-render

  // Called once after Firebase is initialized and user is authenticated
  async init(db, helpers) {
    this._db = db;
    this._helpers = helpers; // { doc, getDoc, setDoc, onSnapshot }
    this._docRef = helpers.doc(db, FIRESTORE_DOC.collection, FIRESTORE_DOC.doc);

    // Initial load
    const snap = await helpers.getDoc(this._docRef);
    if (snap.exists()) {
      this.data = this._merge(structuredClone(SEED_DATA), snap.data());
    } else {
      this.data = structuredClone(SEED_DATA);
      await this._writeRemote();
    }
    this._ready = true;

    // Real-time listener
    this._unsubscribe = helpers.onSnapshot(this._docRef, (snap) => {
      if (this._saving) return; // ignore echo of our own write
      if (!snap.exists()) return;
      this.data = this._merge(structuredClone(SEED_DATA), snap.data());
      if (this._onRemoteUpdate) this._onRemoteUpdate();
    });

    return this.data;
  },

  // Deep-ish merge: ensures new fields from SEED_DATA exist, but remote data wins
  _merge(base, remote) {
    const out = Object.assign({}, base, remote);
    // Ensure nested objects exist even if remote omitted them
    for (const key of Object.keys(base)) {
      if (remote[key] === undefined) out[key] = base[key];
      else if (
        typeof base[key] === 'object' && base[key] !== null && !Array.isArray(base[key]) &&
        typeof remote[key] === 'object' && remote[key] !== null && !Array.isArray(remote[key])
      ) {
        out[key] = Object.assign({}, base[key], remote[key]);
      }
    }
    return out;
  },

  async _writeRemote() {
    if (!this._docRef) return;
    this._saving = true;
    try {
      this.data.meta.lastUpdate = new Date().toISOString();
      await this._helpers.setDoc(this._docRef, this.data);
    } catch (e) {
      console.error('Erreur de synchronisation Firestore', e);
      Utils.toast('⚠️ Erreur de synchronisation — vérifiez votre connexion');
    } finally {
      // small delay so the snapshot echo (if any) is ignored
      setTimeout(() => { this._saving = false; }, 300);
    }
  },

  // save() kept synchronous-looking for module compatibility, fires async write
  save() {
    if (!this._ready) return;
    this._writeRemote();
  },

  // ── MEMBRES ──
  getMembres(filter) {
    let list = this.data.membres;
    if (filter) {
      if (filter.statut) list = list.filter(m => m.statut === filter.statut);
      if (filter.situation) list = list.filter(m => m.situation === filter.situation);
      if (filter.search) {
        const s = filter.search.toLowerCase();
        list = list.filter(m => (m.nom + ' ' + m.prenom).toLowerCase().includes(s));
      }
    }
    return list;
  },

  getMembre(id) {
    return this.data.membres.find(m => m.id === id);
  },

  upsertMembre(membre) {
    const idx = this.data.membres.findIndex(m => m.id === membre.id);
    if (idx >= 0) this.data.membres[idx] = membre;
    else this.data.membres.push(membre);
    this.save();
  },

  deleteMembre(id) {
    this.data.membres = this.data.membres.filter(m => m.id !== id);
    this.save();
  },

  nextMemberId(statut) {
    const prefix = statut === 'Bureau' ? 'B' : statut === 'Intégrant' ? 'I' : 'C';
    const existing = this.data.membres
      .filter(m => m.id.startsWith(prefix))
      .map(m => parseInt(m.id.slice(1), 10))
      .filter(n => !isNaN(n));
    const max = existing.length ? Math.max(...existing) : 0;
    return prefix + String(max + 1).padStart(3, '0');
  },

  // ── SÉANCES (présences) ──
  getSeances(type) {
    let list = this.data.seances;
    if (type) list = list.filter(s => s.type === type);
    return list.sort((a,b) => b.date.localeCompare(a.date));
  },

  getSeance(id) {
    return this.data.seances.find(s => s.id === id);
  },

  upsertSeance(seance) {
    const idx = this.data.seances.findIndex(s => s.id === seance.id);
    if (idx >= 0) this.data.seances[idx] = seance;
    else this.data.seances.push(seance);
    this.save();
  },

  deleteSeance(id) {
    this.data.seances = this.data.seances.filter(s => s.id !== id);
    this.save();
  },

  // Compute consecutive-absence alert per member (samedi only)
  // Rule: 2+ consecutive 'Absence justifiée' or 'Absence non justifiée' on samedi sessions
  getDisciplineStats(membreId) {
    const samedis = this.getSeances('samedi').sort((a,b) => a.date.localeCompare(b.date));
    const dimanches = this.getSeances('dimanche');

    let counts = { present:0, retardJ:0, retardNJ:0, absJ:0, absNJ:0, voyage:0, total:0 };
    let consecutive = 0, maxConsecutive = 0;

    samedis.forEach(s => {
      const st = s.presences[membreId];
      if (!st || st === '—') return;
      counts.total++;
      switch(st) {
        case 'Présent': counts.present++; consecutive = 0; break;
        case 'Retard justifié': counts.retardJ++; consecutive = 0; break;
        case 'Retard non justifié': counts.retardNJ++; consecutive = 0; break;
        case 'Absence justifiée': counts.absJ++; consecutive++; break;
        case 'Absence non justifiée': counts.absNJ++; consecutive++; break;
        case 'Voyage': counts.voyage++; consecutive = 0; break;
      }
      if (consecutive > maxConsecutive) maxConsecutive = consecutive;
    });

    const txSamedi = counts.total > 0 ? counts.present / counts.total : 0;

    let dimCounts = { present:0, total:0 };
    dimanches.forEach(s => {
      const st = s.presences[membreId];
      if (!st || st === '—') return;
      dimCounts.total++;
      if (st === 'Présent') dimCounts.present++;
    });
    const txDimanche = dimCounts.total > 0 ? dimCounts.present / dimCounts.total : 0;

    let currentStreak = 0;
    for (let i = samedis.length - 1; i >= 0; i--) {
      const st = samedis[i].presences[membreId];
      if (!st || st === '—') continue;
      if (st === 'Absence justifiée' || st === 'Absence non justifiée') currentStreak++;
      else break;
    }

    return {
      ...counts,
      txSamedi, txDimanche,
      maxConsecutive,
      currentStreak,
      interdit: currentStreak >= 2,
    };
  },

  // ── ÉVALUATIONS ──
  getEvaluation(membreId) {
    return this.data.evaluations[membreId] || null;
  },
  setEvaluation(membreId, evalData) {
    this.data.evaluations[membreId] = evalData;
    this.save();
  },

  // ── COTISATIONS ──
  getCotisation(membreId, monthKey) {
    return (this.data.cotisations[membreId] || {})[monthKey] || 0;
  },
  setCotisation(membreId, monthKey, montant) {
    if (!this.data.cotisations[membreId]) this.data.cotisations[membreId] = {};
    this.data.cotisations[membreId][monthKey] = montant;
    this.save();
  },
  getCotisationDue(membre) {
    if (membre.statut === 'Bureau') return 500;
    return 250;
  },

  // ── OFFRANDES ──
  getOffrandes() { return this.data.offrandes.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addOffrande(o) { this.data.offrandes.push(o); this.save(); },
  deleteOffrande(id) { this.data.offrandes = this.data.offrandes.filter(o=>o.id!==id); this.save(); },

  // ── MOUVEMENTS ──
  getMouvements() { return this.data.mouvements.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addMouvement(m) { this.data.mouvements.push(m); this.save(); },
  deleteMouvement(id) { this.data.mouvements = this.data.mouvements.filter(m=>m.id!==id); this.save(); },

  // ── SANCTIONS ──
  getSanctions() { return this.data.sanctions.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addSanction(s) { this.data.sanctions.push(s); this.save(); },
  updateSanction(id, patch) {
    const s = this.data.sanctions.find(x=>x.id===id);
    if (s) Object.assign(s, patch);
    this.save();
  },
  deleteSanction(id) { this.data.sanctions = this.data.sanctions.filter(s=>s.id!==id); this.save(); },

  // ── ACTIVITÉS ──
  getActivites() { return this.data.activites.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addActivite(a) { this.data.activites.push(a); this.save(); },
  updateActivite(id, patch) {
    const a = this.data.activites.find(x=>x.id===id);
    if (a) Object.assign(a, patch);
    this.save();
  },
  deleteActivite(id) { this.data.activites = this.data.activites.filter(a=>a.id!==id); this.save(); },

  // ── MODÉRATIONS ──
  getModerations() { return this.data.moderations.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addModeration(m) { this.data.moderations.push(m); this.save(); },
  deleteModeration(id) { this.data.moderations = this.data.moderations.filter(m=>m.id!==id); this.save(); },

  // ── JEUX D'ANGES ──
  getJeuxAnges() { return this.data.jeuxAnges.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addJeuAnge(j) { this.data.jeuxAnges.push(j); this.save(); },
  deleteJeuAnge(id) { this.data.jeuxAnges = this.data.jeuxAnges.filter(j=>j.id!==id); this.save(); },

  // ── RÉPERTOIRE ──
  getRepertoire() { return this.data.repertoire.slice(); },
  addChant(c) { this.data.repertoire.push(c); this.save(); },
  updateChant(id, patch) {
    const c = this.data.repertoire.find(x=>x.id===id);
    if (c) Object.assign(c, patch);
    this.save();
  },
  deleteChant(id) { this.data.repertoire = this.data.repertoire.filter(c=>c.id!==id); this.save(); },

  // ── RÉPÉTITIONS ──
  getRepetitions() { return this.data.repetitions.slice().sort((a,b)=>b.date.localeCompare(a.date)); },
  addRepetition(r) { this.data.repetitions.push(r); this.save(); },
  updateRepetition(id, patch) {
    const r = this.data.repetitions.find(x=>x.id===id);
    if (r) Object.assign(r, patch);
    this.save();
  },
  deleteRepetition(id) { this.data.repetitions = this.data.repetitions.filter(r=>r.id!==id); this.save(); },

  // ── TESTS INTÉGRATION ──
  getTestIntegration(membreId) { return this.data.testsIntegration[membreId] || null; },
  setTestIntegration(membreId, testData) {
    this.data.testsIntegration[membreId] = testData;
    this.save();
  },

  // ── IGI CALCULATION ──
  calcIGI(membreId) {
    const membre = this.getMembre(membreId);
    if (!membre) return null;

    const dis = this.getDisciplineStats(membreId);
    const scoreDiscipline = Math.round(dis.txSamedi * 25 * 10) / 10;

    const monthKeys = [];
    const year = this.data.meta.annee;
    for (let m=1;m<=12;m++) monthKeys.push(`${year}-${String(m).padStart(2,'0')}`);
    const due = this.getCotisationDue(membre) * 12;
    const paid = monthKeys.reduce((sum,k)=>sum + this.getCotisation(membreId,k), 0);
    const txCotis = due > 0 ? Math.min(paid/due, 1) : 0;
    const scoreTresorerie = Math.round(txCotis * 25 * 10) / 10;

    const modCount = this.data.moderations.filter(m => m.moderateur === membre.nom).length;
    const scoreSecretariat = Math.min(Math.round(modCount * 5 * 10)/10, 25);

    const evalData = this.getEvaluation(membreId);
    let moyMusicale = 0;
    if (evalData && evalData.notes) {
      const vals = Object.values(evalData.notes);
      moyMusicale = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    }
    const scoreMusical = Math.round((moyMusicale/20)*25*10)/10;

    const igi = Math.round((scoreDiscipline + scoreTresorerie + scoreSecretariat + scoreMusical)*10)/10;

    let categorie;
    if (igi >= 90) categorie = '🌟 Exemplaire';
    else if (igi >= 75) categorie = '⭐ Très impliqué';
    else if (igi >= 55) categorie = '✔️ Impliqué';
    else if (igi >= 35) categorie = '⚠️ Peu impliqué';
    else categorie = '🆘 À accompagner';

    return {
      scoreDiscipline, scoreTresorerie, scoreSecretariat, scoreMusical,
      igi, categorie, txSamedi: dis.txSamedi, txDimanche: dis.txDimanche,
      txCotis, moyMusicale, alertePrestation: dis.interdit,
    };
  },

  // ── ANNIVERSAIRES ──
  getAnniversaireInfo(membre) {
    if (!membre.dateNaissance) return null;
    const dob = new Date(membre.dateNaissance);
    const today = new Date();
    today.setHours(0,0,0,0);

    const age = today.getFullYear() - dob.getFullYear() -
      ((today.getMonth() < dob.getMonth() || (today.getMonth()===dob.getMonth() && today.getDate()<dob.getDate())) ? 1 : 0);

    let next = new Date(today.getFullYear(), dob.getMonth(), dob.getDate());
    if (next < today) next = new Date(today.getFullYear()+1, dob.getMonth(), dob.getDate());

    const daysRemaining = Math.round((next - today) / (1000*60*60*24));
    const isToday = dob.getMonth() === today.getMonth() && dob.getDate() === today.getDate();
    const isThisMonth = dob.getMonth() === today.getMonth();
    const isThisWeek = daysRemaining >= 0 && daysRemaining <= 7;

    return { age, nextDate: next, daysRemaining, isToday, isThisMonth, isThisWeek };
  },

  // ── EXPORT / IMPORT ──
  exportJSON() {
    return JSON.stringify(this.data, null, 2);
  },
  importJSON(json) {
    try {
      const parsed = JSON.parse(json);
      this.data = this._merge(structuredClone(SEED_DATA), parsed);
      this.save();
      return true;
    } catch(e) {
      console.error('Import error', e);
      return false;
    }
  },
  resetAll() {
    this.data = structuredClone(SEED_DATA);
    this.save();
  },
};

// ===== ROUTER =====
// ════════════════════════════════════════════════════════════════
// ROUTER — navigation entre modules (SPA simple)
// ════════════════════════════════════════════════════════════════

const Router = {
  routes: {},
  current: null,

  register(name, renderFn) {
    this.routes[name] = renderFn;
  },

  navigate(name, params) {
    this.current = name;
    window.location.hash = '#' + name;
    this.render(params);
    this.updateNav();
    document.getElementById('app-main').scrollTop = 0;
  },

  render(params) {
    const main = document.getElementById('app-main');
    const fn = this.routes[this.current];
    if (fn) {
      main.innerHTML = '';
      fn(main, params);
    } else {
      main.innerHTML = '<div class="empty-state"><div class="empty-state__icon">??</div><div class="empty-state__text">Page introuvable</div></div>';
    }
  },

  updateNav() {
    document.querySelectorAll('.nav-item').forEach(function(el) {
      el.classList.toggle('active', el.dataset.route === Router.current);
    });
  },

  init() {
    const initial = (window.location.hash || '#dashboard').slice(1);
    this.current = this.routes[initial] ? initial : 'dashboard';
    this.render();
    this.updateNav();

    window.addEventListener('hashchange', () => {
      const r = window.location.hash.slice(1);
      if (this.routes[r]) {
        this.current = r;
        this.render();
        this.updateNav();
      }
    });
  },
};

// ===== AUTH UI =====
// ════════════════════════════════════════════════════════════════
// AUTH UI — Écran de connexion / inscription
// ════════════════════════════════════════════════════════════════

const AuthUI = {
  mode: 'login', // 'login' | 'signup' | 'reset'

  render(container, authHelpers) {
    this._auth = authHelpers; // { auth, signIn, signUp, resetPassword }

    container.innerHTML = `
      <div class="auth-screen">
        <div class="auth-card">
          <div class="auth-logo">🎵</div>
          <div class="auth-title">Carnet de Chorale</div>
          <div class="auth-subtitle" id="auth-subtitle">Connectez-vous pour accéder au système</div>

          <div id="auth-error" class="auth-error" style="display:none;"></div>

          <form id="auth-form">
            <div class="field">
              <label>Adresse email</label>
              <input type="email" id="auth-email" required autocomplete="email" placeholder="vous@exemple.com">
            </div>
            <div class="field" id="auth-pass-field">
              <label>Mot de passe</label>
              <input type="password" id="auth-password" required autocomplete="current-password" placeholder="••••••••" minlength="6">
            </div>
            <div class="field" id="auth-pass2-field" style="display:none;">
              <label>Confirmer le mot de passe</label>
              <input type="password" id="auth-password2" autocomplete="new-password" placeholder="••••••••" minlength="6">
            </div>
            <button type="submit" class="btn primary block" id="auth-submit">Se connecter</button>
          </form>

          <div class="auth-links">
            <a href="#" id="auth-toggle-reset">Mot de passe oublié ?</a>
          </div>
          <div class="auth-divider"></div>
          <div class="auth-links">
            <span id="auth-toggle-text">Pas encore de compte ?</span>
            <a href="#" id="auth-toggle-mode">Créer un compte</a>
          </div>
        </div>
        <div class="auth-footer">🎵 Chorale — Carnet de Gestion · Données synchronisées en temps réel</div>
      </div>
    `;

    this._bind(container);
  },

  _bind(container) {
    const form = container.querySelector('#auth-form');
    const toggleMode = container.querySelector('#auth-toggle-mode');
    const toggleReset = container.querySelector('#auth-toggle-reset');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      this._submit(container);
    });

    toggleMode.addEventListener('click', (e) => {
      e.preventDefault();
      this.mode = this.mode === 'login' ? 'signup' : 'login';
      this._updateUI(container);
    });

    toggleReset.addEventListener('click', (e) => {
      e.preventDefault();
      this.mode = this.mode === 'reset' ? 'login' : 'reset';
      this._updateUI(container);
    });
  },

  _updateUI(container) {
    const subtitle = container.querySelector('#auth-subtitle');
    const submitBtn = container.querySelector('#auth-submit');
    const pass2Field = container.querySelector('#auth-pass2-field');
    const passField = container.querySelector('#auth-pass-field');
    const toggleModeText = container.querySelector('#auth-toggle-text');
    const toggleModeLink = container.querySelector('#auth-toggle-mode');
    const toggleResetLink = container.querySelector('#auth-toggle-reset');
    this._hideError(container);

    if (this.mode === 'login') {
      subtitle.textContent = 'Connectez-vous pour accéder au système';
      submitBtn.textContent = 'Se connecter';
      pass2Field.style.display = 'none';
      passField.style.display = '';
      toggleModeText.textContent = 'Pas encore de compte ?';
      toggleModeLink.textContent = 'Créer un compte';
      toggleResetLink.parentElement.style.display = '';
    } else if (this.mode === 'signup') {
      subtitle.textContent = 'Créez votre compte pour rejoindre la chorale';
      submitBtn.textContent = 'Créer mon compte';
      pass2Field.style.display = '';
      passField.style.display = '';
      toggleModeText.textContent = 'Déjà un compte ?';
      toggleModeLink.textContent = 'Se connecter';
      toggleResetLink.parentElement.style.display = 'none';
    } else if (this.mode === 'reset') {
      subtitle.textContent = 'Recevez un lien de réinitialisation par email';
      submitBtn.textContent = 'Envoyer le lien';
      pass2Field.style.display = 'none';
      passField.style.display = 'none';
      toggleModeText.textContent = '';
      toggleModeLink.textContent = 'Retour à la connexion';
      toggleResetLink.parentElement.style.display = 'none';
    }
  },

  _showError(container, msg) {
    const el = container.querySelector('#auth-error');
    el.textContent = msg;
    el.style.display = '';
  },
  _hideError(container) {
    const el = container.querySelector('#auth-error');
    el.style.display = 'none';
  },

  async _submit(container) {
    const email = container.querySelector('#auth-email').value.trim();
    const password = container.querySelector('#auth-password').value;
    const password2 = container.querySelector('#auth-password2').value;
    const submitBtn = container.querySelector('#auth-submit');
    this._hideError(container);

    if (this.mode === 'reset') {
      try {
        submitBtn.disabled = true;
        await this._auth.resetPassword(email);
        Utils.toast('📧 Email de réinitialisation envoyé');
        this.mode = 'login';
        this._updateUI(container);
      } catch (e) {
        this._showError(container, this._friendlyError(e));
      } finally {
        submitBtn.disabled = false;
      }
      return;
    }

    if (this.mode === 'signup' && password !== password2) {
      this._showError(container, 'Les mots de passe ne correspondent pas.');
      return;
    }

    try {
      submitBtn.disabled = true;
      submitBtn.textContent = '...';
      if (this.mode === 'login') {
        await this._auth.signIn(email, password);
      } else {
        await this._auth.signUp(email, password);
      }
      // onAuthStateChanged in app.js handles the redirect
    } catch (e) {
      this._showError(container, this._friendlyError(e));
      submitBtn.disabled = false;
      this._updateUI(container);
    }
  },

  _friendlyError(e) {
    const code = e && e.code ? e.code : '';
    const map = {
      'auth/invalid-email': 'Adresse email invalide.',
      'auth/user-disabled': 'Ce compte a été désactivé.',
      'auth/user-not-found': 'Aucun compte ne correspond à cet email.',
      'auth/wrong-password': 'Mot de passe incorrect.',
      'auth/invalid-credential': 'Email ou mot de passe incorrect.',
      'auth/email-already-in-use': 'Un compte existe déjà avec cet email.',
      'auth/weak-password': 'Le mot de passe doit contenir au moins 6 caractères.',
      'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
      'auth/network-request-failed': 'Problème de connexion internet.',
    };
    return map[code] || 'Une erreur est survenue. Réessayez.';
  },
};

    // Cotisations
    const year = d.meta.annee;
    let totalDue = 0, totalPaid = 0;
    membres.forEach(m => {
      const due = Store.getCotisationDue(m) * 12;
      totalDue += due;
      for (let mo=1; mo<=12; mo++) {
        totalPaid += Store.getCotisation(m.id, `${year}-${String(mo).padStart(2,'0')}`);

    const txRecouvrement = totalDue > 0 ? totalPaid/totalDue : 0;

    const seances = Store.data.seances.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
    if (!seances.length) {
      return `<div class="empty-state"><div class="empty-state__icon">📋</div><div class="empty-state__text">Aucune séance enregistrée.<br>Allez dans Discipline pour pointer les présences.</div></div>`;
    }
    return seances.map(s => {
      const presCount = Object.values(s.presences).filter(p => p === 'Présent').length;
      const total = Object.keys(s.presences).length;
      const icon = s.type === 'samedi' ? '🎹' : '⛪';
      const label = s.type === 'samedi' ? 'Répétition samedi' : 'Culte dimanche';
      return `
        <div class="flex-between" style="padding:6px 0;">
          <div>
            <div style="font-weight:600;font-size:0.88rem;">${icon} ${label}</div>
            <div class="text-sm text-muted">${Utils.fmtDate(s.date)}</div>
          </div>
          <div class="pill actif">${presCount}/${total} présents</div>
        </div>
      `;
    }).join('<div class="divider" style="margin:6px 0;"></div>');
  },
};

// ===== MODULE: MEMBRES =====
// ════════════════════════════════════════════════════════════════
// MEMBRES — Base de données centrale
// ════════════════════════════════════════════════════════════════

const MembresModule = {
  filter: { statut: '', search: '' },

  render(main) {
    const tabs = [
      { key: '', label: 'Tous' },
      { key: 'Bureau', label: 'Bureau' },
      { key: 'Choriste', label: 'Choristes' },
      { key: 'Intégrant', label: 'Intégrants' },
    ];

    main.innerHTML = `
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input type="text" placeholder="Rechercher un membre..." id="member-search" value="${Utils.escapeHtml(this.filter.search)}">
      </div>
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.filter.statut===t.key?'active':''}" data-statut="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="member-list"></div>
    `;

    main.querySelectorAll('[data-statut]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.filter.statut = btn.dataset.statut;
        this.render(main);
      });
    });

    main.querySelector('#member-search').addEventListener('input', (e) => {
      this.filter.search = e.target.value;
      this.renderList(main.querySelector('#member-list'));
    });

    this.renderList(main.querySelector('#member-list'));

    // FAB
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.innerHTML = '+';
    fab.id = 'fab-add-member';
    main.appendChild(fab);
    fab.addEventListener('click', () => this.openMemberForm());
  },

  renderList(container) {
    const list = Store.getMembres({
      statut: this.filter.statut || undefined,
      search: this.filter.search || undefined,
    }).sort((a,b) => a.nom.localeCompare(b.nom));

    if (!list.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">👥</div><div class="empty-state__text">Aucun membre trouvé</div></div>`;
      return;
    }

    container.innerHTML = `<div class="list">${list.map(m => {
      const pillClass = m.statut === 'Bureau' ? 'bureau' : m.statut === 'Intégrant' ? 'integrant' : 'choriste';
      const anniv = Store.getAnniversaireInfo(m);
      const annivBadge = anniv && anniv.isToday ? ' 🎂' : '';
      return `
        <div class="list-row" data-id="${m.id}">
          <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(m.nom)}${annivBadge}</div>
            <div class="list-row__subtitle">${m.fonction || m.pupitre || '—'}</div>
          </div>
          <div class="list-row__meta">
            <span class="pill ${pillClass}">${m.statut}</span>
          </div>
          <span class="list-row__chevron">›</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openMemberDetail(row.dataset.id));
    });
  },

  openMemberDetail(id) {
    const m = Store.getMembre(id);
    if (!m) return;
    const igi = m.statut === 'Choriste' ? Store.calcIGI(id) : null;
    const dis = Store.getDisciplineStats(id);
    const anniv = Store.getAnniversaireInfo(m);

    const html = `
      <div class="card" style="text-align:center;">
        <div class="list-row__avatar" style="width:60px;height:60px;font-size:1.4rem;margin:0 auto 8px;">${Utils.initials(m.nom)}</div>
        <div class="font-display" style="font-size:1.3rem;font-weight:700;">${Utils.escapeHtml(m.nom)}</div>
        <div class="text-muted text-sm">${m.fonction || '—'} ${m.pupitre ? '· '+m.pupitre : ''}</div>
        <div class="mt-8"><span class="pill ${m.statut==='Bureau'?'bureau':m.statut==='Intégrant'?'integrant':'choriste'}">${m.statut}</span> <span class="pill actif">${m.situation}</span></div>
      </div>

      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Sam.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txSamedi>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txSamedi)}</div>
        </div>
        <div class="card center">
          <div class="text-sm text-muted">Tx Présence Dim.</div>
          <div class="font-display" style="font-size:1.4rem;font-weight:700;color:${dis.txDimanche>=0.8?'var(--green)':'var(--red)'};">${Utils.pct(dis.txDimanche)}</div>
        </div>
      </div>

      ${dis.interdit ? `
        <div class="alert-banner danger">
          <div class="alert-banner__icon">⛔</div>
          <div><b>Non autorisé à prester</b> — ${dis.currentStreak} absences consécutives au samedi.</div>
        </div>` : ''}

      ${igi ? `
        <div class="card">
          <div class="flex-between">
            <span class="text-sm text-muted">Indice Global d'Implication</span>
            <span class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--maroon);">${igi.igi}/100</span>
          </div>
          <div class="progress mt-8"><div class="progress__fill" style="width:${igi.igi}%;background:var(--gold);"></div></div>
          <div class="mt-8"><span class="pill ${igi.categorie.includes('Exemplaire')||igi.categorie.includes('impliqué')&&!igi.categorie.includes('Peu')?'exemplaire':igi.categorie.includes('accompagner')?'accompagner':'actif'}">${igi.categorie}</span></div>
        </div>` : ''}

      ${anniv ? `
        <div class="card">
          <div class="flex-between">
            <span class="text-sm text-muted">🎂 Anniversaire</span>
            <span style="font-weight:700;">${Utils.fmtDate(m.dateNaissance)} (${anniv.age} ans)</span>
          </div>
          <div class="text-sm text-muted mt-8">${anniv.isToday ? "🎉 C'est aujourd'hui !" : `Dans ${anniv.daysRemaining} jour(s)`}</div>
        </div>` : ''}

      <div class="section-title"><span class="ornament">ℹ️</span> Informations</div>
      <div class="card">
        ${this.infoRow('Identifiant', m.id)}
        ${this.infoRow('Sexe', m.sexe === 'M' ? 'Masculin' : 'Féminin')}
        ${this.infoRow('Téléphone', m.telephone || '—')}
        ${this.infoRow('Adresse', m.adresse || '—')}
        ${this.infoRow('Email', m.email || '—')}
        ${this.infoRow("Date d'entrée", Utils.fmtDate(m.dateEntree))}
        ${this.infoRow('Cotisation/mois', Utils.fmtFCFA(Store.getCotisationDue(m)))}
        ${m.observations ? this.infoRow('Observations', m.observations) : ''}
      </div>

      <div class="grid-2 mt-16">
        <button class="btn secondary block" id="edit-member">✏️ Modifier</button>
        <button class="btn danger block" id="delete-member">🗑️ Supprimer</button>
      </div>
    `;

    const sheet = Utils.openSheet(`👤 ${m.nom}`, html);
    sheet.querySelector('#edit-member').addEventListener('click', () => {
      Utils.closeSheet();
      this.openMemberForm(m);
    });
    sheet.querySelector('#delete-member').addEventListener('click', () => {
      Utils.confirmAction(`Supprimer définitivement <b>${Utils.escapeHtml(m.nom)}</b> de la base de données ?`, () => {
        Store.deleteMembre(id);
        Utils.toast('Membre supprimé');
        Router.render();
      });
    });
  },

  infoRow(label, value) {
    return `<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);"><span class="text-sm text-muted">${label}</span><span class="text-sm" style="font-weight:600;text-align:right;max-width:60%;">${Utils.escapeHtml(value)}</span></div>`;
  },

  openMemberForm(membre) {
    const isEdit = !!membre;
    const m = membre || { id:'', nom:'', prenom:'', sexe:'F', dateNaissance:'', telephone:'', adresse:'', pupitre:'', fonction:'', statut:'Choriste', dateEntree: Utils.todayISO(), situation:'Actif', email:'', observations:'' };

    const html = `
      <div class="field">
        <label>Nom complet *</label>
        <input type="text" id="f-nom" value="${Utils.escapeHtml(m.nom)}" placeholder="Nom du membre">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Sexe</label>
          <select id="f-sexe">
            <option value="F" ${m.sexe==='F'?'selected':''}>Féminin</option>
            <option value="M" ${m.sexe==='M'?'selected':''}>Masculin</option>
          </select>
        </div>
        <div class="field">
          <label>Statut</label>
          <select id="f-statut">
            <option value="Choriste" ${m.statut==='Choriste'?'selected':''}>Choriste</option>
            <option value="Bureau" ${m.statut==='Bureau'?'selected':''}>Bureau</option>
            <option value="Intégrant" ${m.statut==='Intégrant'?'selected':''}>Intégrant</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Fonction</label>
        <input type="text" id="f-fonction" value="${Utils.escapeHtml(m.fonction)}" placeholder="Ex: Président, Choriste...">
      </div>
      <div class="field">
        <label>Pupitre</label>
        <select id="f-pupitre">
          <option value="">—</option>
          ${Utils.PUPITRES.map(p => `<option value="${p}" ${m.pupitre===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date de naissance</label>
          <input type="date" id="f-naissance" value="${m.dateNaissance || ''}">
        </div>
        <div class="field">
          <label>Téléphone</label>
          <input type="tel" id="f-tel" value="${Utils.escapeHtml(m.telephone)}" placeholder="07 00 00 00 00">
        </div>
      </div>
      <div class="field">
        <label>Adresse</label>
        <input type="text" id="f-adresse" value="${Utils.escapeHtml(m.adresse)}">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="f-email" value="${Utils.escapeHtml(m.email)}">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date d'entrée</label>
          <input type="date" id="f-entree" value="${m.dateEntree || ''}">
        </div>
        <div class="field">
          <label>Situation</label>
          <select id="f-situation">
            ${['Actif','Suspendu','Démission','Intégré','Observateur'].map(s => `<option value="${s}" ${m.situation===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field">
        <label>Observations</label>
        <textarea id="f-obs" rows="2">${Utils.escapeHtml(m.observations)}</textarea>
      </div>
      <button class="btn primary block" id="save-member">💾 ${isEdit?'Enregistrer':'Ajouter le membre'}</button>
    `;

    const sheet = Utils.openSheet(isEdit ? 'Modifier le membre' : 'Nouveau membre', html);
    sheet.querySelector('#save-member').addEventListener('click', () => {
      const nom = sheet.querySelector('#f-nom').value.trim();
      if (!nom) { Utils.toast('Le nom est requis'); return; }
      const statut = sheet.querySelector('#f-statut').value;

      const updated = {
        id: isEdit ? m.id : Store.nextMemberId(statut),
        nom,
        prenom: m.prenom,
        sexe: sheet.querySelector('#f-sexe').value,
        dateNaissance: sheet.querySelector('#f-naissance').value,
        telephone: sheet.querySelector('#f-tel').value,
        adresse: sheet.querySelector('#f-adresse').value,
        pupitre: sheet.querySelector('#f-pupitre').value,
        fonction: sheet.querySelector('#f-fonction').value,
        statut,
        dateEntree: sheet.querySelector('#f-entree').value,
        situation: sheet.querySelector('#f-situation').value,
        email: sheet.querySelector('#f-email').value,
        observations: sheet.querySelector('#f-obs').value,
      };

      Store.upsertMembre(updated);
      Utils.closeSheet();
      Utils.toast(isEdit ? 'Membre modifié' : 'Membre ajouté');
      Router.render();
    });
  },
};

// ===== MODULE: DISCIPLINE =====
// ════════════════════════════════════════════════════════════════
// DISCIPLINE — Présences Samedis & Dimanches + Alertes + Sanctions
// ════════════════════════════════════════════════════════════════

const DisciplineModule = {
  tab: 'pointage', // pointage | stats | sanctions

  render(main) {
    const tabs = [
      { key: 'pointage', label: '✅ Pointage' },
      { key: 'stats', label: '📊 Statistiques' },
      { key: 'sanctions', label: '💸 Sanctions' },
    ];

    main.innerHTML = `
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="discipline-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.tab = btn.dataset.tab;
        this.render(main);
      });
    });

    const content = main.querySelector('#discipline-content');
    if (this.tab === 'pointage') this.renderPointage(content);
    else if (this.tab === 'stats') this.renderStats(content);
    else this.renderSanctions(content, main);
  },

  // ── POINTAGE ──
  renderPointage(container) {
    const seances = Store.getSeances();
    container.innerHTML = `
      <div class="card">
        <div class="section-title" style="margin-top:0;"><span class="ornament">📝</span> Nouvelle séance</div>
        <div class="field-row">
          <div class="field">
            <label>Type de séance</label>
            <select id="new-type">
              <option value="samedi">🎹 Répétition Samedi</option>
              <option value="dimanche">⛪ Culte Dimanche</option>
            </select>
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="new-date" value="${Utils.todayISO()}">
          </div>
        </div>
        <button class="btn primary block" id="start-seance">Pointer cette séance</button>
      </div>

      <div class="section-title"><span class="ornament">📋</span> Séances enregistrées</div>
      <div id="seance-list"></div>
    `;

    container.querySelector('#start-seance').addEventListener('click', () => {
      const type = container.querySelector('#new-type').value;
      const date = container.querySelector('#new-date').value;
      if (!date) { Utils.toast('Veuillez choisir une date'); return; }

      // Check if seance exists for that date+type
      let existing = Store.data.seances.find(s => s.date === date && s.type === type);
      if (!existing) {
        existing = {
          id: Utils.genId('seance'),
          date, type,
          presences: {},
        };
        // Pre-fill all members with '—'
        Store.data.membres.forEach(m => { existing.presences[m.id] = '—'; });
        Store.upsertSeance(existing);
      }
      this.openPointageSheet(existing.id);
    });

    this.renderSeanceList(container.querySelector('#seance-list'), seances);
  },

  renderSeanceList(container, seances) {
    if (!seances.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">📋</div><div class="empty-state__text">Aucune séance enregistrée</div></div>`;
      return;
    }
    container.innerHTML = `<div class="list">${seances.slice(0, 20).map(s => {
      const icon = s.type === 'samedi' ? '🎹' : '⛪';
      const label = s.type === 'samedi' ? 'Répétition Samedi' : 'Culte Dimanche';
      const total = Object.keys(s.presences).length;
      const present = Object.values(s.presences).filter(p=>p==='Présent').length;
      return `
        <div class="list-row" data-id="${s.id}">
          <div class="list-row__avatar">${icon}</div>
          <div class="list-row__body">
            <div class="list-row__title">${label}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(s.date)}</div>
          </div>
          <div class="list-row__meta">
            <span class="pill actif">${present}/${total}</span>
          </div>
          <span class="list-row__chevron">›</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openPointageSheet(row.dataset.id));
    });
  },

  openPointageSheet(seanceId) {
    const seance = Store.getSeance(seanceId);
    if (!seance) return;
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));
    const label = seance.type === 'samedi' ? '🎹 Répétition Samedi' : '⛪ Culte Dimanche';

    const html = `
      <div class="text-sm text-muted mb-8" style="margin-bottom:10px;">${Utils.fmtDateLong(seance.date)}</div>
      <div class="card" style="padding:10px;">
        <div class="flex-between" style="margin-bottom:6px;">
          <span class="text-sm" style="font-weight:700;">Marquer tous :</span>
          <div style="display:flex;gap:6px;">
            <button class="btn sm sage" data-bulk="Présent">Présents</button>
            <button class="btn sm secondary" data-bulk="—">Effacer</button>
          </div>
        </div>
      </div>
      <div class="list" style="margin-top:8px;">
        ${membres.map(m => {
          const st = seance.presences[m.id] || '—';
          return `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
                <div class="list-row__subtitle">${m.statut}</div>
              </div>
              <select class="status-select ${Utils.statusClass(st)}" data-member="${m.id}" style="max-width:130px;">
                ${['—'].concat(Utils.STATUTS_PRESENCE).map(s => `<option value="${s}" ${st===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          `;
        }).join('')}
      </div>
      <div class="grid-2 mt-16">
        <button class="btn danger block" id="delete-seance">🗑️ Supprimer séance</button>
        <button class="btn primary block" id="close-pointage">✅ Terminé</button>
      </div>
    `;

    const sheet = Utils.openSheet(label, html);

    sheet.querySelectorAll('[data-member]').forEach(sel => {
      sel.addEventListener('change', () => {
        const mid = sel.dataset.member;
        seance.presences[mid] = sel.value;
        sel.className = 'status-select ' + Utils.statusClass(sel.value);
        Store.upsertSeance(seance);
      });
    });

    sheet.querySelectorAll('[data-bulk]').forEach(btn => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.bulk;
        membres.forEach(m => { seance.presences[m.id] = val; });
        Store.upsertSeance(seance);
        Utils.closeSheet();
        this.openPointageSheet(seanceId);
      });
    });

    sheet.querySelector('#delete-seance').addEventListener('click', () => {
      Utils.confirmAction('Supprimer cette séance et toutes ses présences ?', () => {
        Store.deleteSeance(seanceId);
        Utils.closeSheet();
        Utils.toast('Séance supprimée');
        Router.render();
      });
    });

    sheet.querySelector('#close-pointage').addEventListener('click', () => {
      Utils.closeSheet();
      Router.render();
    });
  },

  // ── STATISTIQUES ──
  renderStats(container) {
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));

    container.innerHTML = `
      <div class="scroll-table">
        <table>
          <thead>
            <tr>
              <th>Membre</th>
              <th>Tx Sam.</th>
              <th>Tx Dim.</th>
              <th>Abs.NJ</th>
              <th>Consec.</th>
              <th>Prestation</th>
            </tr>
          </thead>
          <tbody>
            ${membres.map(m => {
              const dis = Store.getDisciplineStats(m.id);
              const txSamColor = dis.txSamedi>=0.8?'var(--green)':dis.txSamedi>=0.6?'var(--amber)':'var(--red)';
              const txDimColor = dis.txDimanche>=0.8?'var(--green)':dis.txDimanche>=0.6?'var(--amber)':'var(--red)';
              return `
                <tr>
                  <td>${Utils.escapeHtml(m.nom)}</td>
                  <td style="color:${txSamColor};font-weight:700;">${Utils.pct(dis.txSamedi)}</td>
                  <td style="color:${txDimColor};font-weight:700;">${Utils.pct(dis.txDimanche)}</td>
                  <td>${dis.absNJ}</td>
                  <td style="font-weight:700;color:${dis.currentStreak>=2?'var(--red)':'inherit'};">${dis.currentStreak}</td>
                  <td>${dis.interdit ? '<span class="pill suspendu">⛔</span>' : '<span class="pill actif">✅</span>'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div class="text-sm text-muted mt-16" style="text-align:center;">
        ℹ️ Règle d'alerte : 2 absences consécutives (justifiées ou non) au samedi → interdiction de prester. Une présence réinitialise le compteur.
      </div>
    `;
  },

  // ── SANCTIONS ──
  renderSanctions(container, main) {
    const sanctions = Store.getSanctions();
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));

    const totalPaye = sanctions.filter(s=>s.statut==='Payé').reduce((sum,s)=>sum+Number(s.montant||0),0);

    container.innerHTML = `
      <div class="card">
        <div class="flex-between">
          <span class="text-sm text-muted">Total sanctions payées</span>
          <span class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--maroon);">${Utils.fmtFCFA(totalPaye)}</span>
        </div>
      </div>
      <div id="sanction-list"></div>
    `;

    this.renderSanctionList(container.querySelector('#sanction-list'), sanctions);

    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.innerHTML = '+';
    fab.id = 'fab-add-sanction';
    main.appendChild(fab);
    fab.addEventListener('click', () => this.openSanctionForm(membres));
  },

  renderSanctionList(container, sanctions) {
    if (!sanctions.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">💸</div><div class="empty-state__text">Aucune sanction enregistrée</div></div>`;
      return;
    }
    container.innerHTML = `<div class="list">${sanctions.map(s => {
      const statusClass = s.statut === 'Payé' ? 'actif' : s.statut === 'Annulé' ? 'suspendu' : 'bureau';
      return `
        <div class="list-row" data-id="${s.id}">
          <div class="list-row__avatar">💸</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(s.membre)}</div>
            <div class="list-row__subtitle">${s.motif} · ${Utils.fmtDate(s.date)}</div>
          </div>
          <div class="list-row__meta">
            <div style="font-weight:700;">${Utils.fmtFCFA(s.montant)}</div>
            <span class="pill ${statusClass}">${s.statut}</span>
          </div>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openSanctionDetail(row.dataset.id));
    });
  },

  openSanctionDetail(id) {
    const s = Store.data.sanctions.find(x=>x.id===id);
    if (!s) return;
    const html = `
      <div class="field">
        <label>Statut</label>
        <select id="s-statut">
          ${['En attente','Payé','Annulé'].map(st => `<option value="${st}" ${s.statut===st?'selected':''}>${st}</option>`).join('')}
        </select>
      </div>
      <div class="grid-2 mt-16">
        <button class="btn danger block" id="del-sanction">🗑️ Supprimer</button>
        <button class="btn primary block" id="save-sanction">💾 Enregistrer</button>
      </div>
    `;
    const sheet = Utils.openSheet(`${s.membre} — ${Utils.fmtFCFA(s.montant)}`, html);
    sheet.querySelector('#save-sanction').addEventListener('click', () => {
      Store.updateSanction(id, { statut: sheet.querySelector('#s-statut').value });
      Utils.closeSheet();
      Utils.toast('Sanction mise à jour');
      Router.render();
    });
    sheet.querySelector('#del-sanction').addEventListener('click', () => {
      Utils.confirmAction('Supprimer cette sanction ?', () => {
        Store.deleteSanction(id);
        Utils.closeSheet();
        Utils.toast('Sanction supprimée');
        Router.render();
      });
    });
  },

  openSanctionForm(membres) {
    const html = `
      <div class="field">
        <label>Membre</label>
        <select id="sf-membre">
          ${membres.map(m => `<option value="${Utils.escapeHtml(m.nom)}">${Utils.escapeHtml(m.nom)}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="sf-date" value="${Utils.todayISO()}">
      </div>
      <div class="field">
        <label>Motif</label>
        <select id="sf-motif">
          <option>Absence NJ</option>
          <option>Retard NJ</option>
          <option>Comportement</option>
          <option>Autre</option>
        </select>
      </div>
      <div class="field">
        <label>Montant (FCFA)</label>
        <input type="number" id="sf-montant" value="500" min="0" step="50">
      </div>
      <button class="btn primary block" id="save-new-sanction">💾 Enregistrer</button>
    `;
    const sheet = Utils.openSheet('Nouvelle sanction', html);
    sheet.querySelector('#save-new-sanction').addEventListener('click', () => {
      Store.addSanction({
        id: Utils.genId('sanc'),
        membre: sheet.querySelector('#sf-membre').value,
        date: sheet.querySelector('#sf-date').value,
        motif: sheet.querySelector('#sf-motif').value,

      });
      Utils.closeSheet();
      Utils.toast('Sanction ajoutée');

// ===== MODULE: TRESORERIE =====
// ════════════════════════════════════════════════════════════════
// TRÉSORERIE — Cotisations, Offrandes, Mouvements, Bilans
// ════════════════════════════════════════════════════════════════

const TresorerieModule = {
  tab: 'cotisations',
  selectedMonth: null,

  render(main) {
    if (!this.selectedMonth) this.selectedMonth = Utils.monthKey();

    const tabs = [
      { key: 'cotisations', label: '📋 Cotisations' },
      { key: 'offrandes', label: '🙏 Offrandes' },
      { key: 'mouvements', label: '📊 Mouvements' },
      { key: 'bilan', label: '💹 Bilan' },
    ];

    main.innerHTML = `
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="treso-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        this.tab = btn.dataset.tab;
        this.render(main);
      });
    });

    const content = main.querySelector('#treso-content');
    if (this.tab === 'cotisations') this.renderCotisations(content);
    else if (this.tab === 'offrandes') this.renderOffrandes(content, main);
    else if (this.tab === 'mouvements') this.renderMouvements(content, main);
    else this.renderBilan(content);
  },

  // ── COTISATIONS ──
  renderCotisations(container) {
    const year = Store.data.meta.annee;
    const membres = Store.data.membres.slice().sort((a,b)=>a.nom.localeCompare(b.nom));

    let totalDue = 0, totalPaid = 0;
    membres.forEach(m => {
      const due = Store.getCotisationDue(m);
      totalDue += due;
      totalPaid += Store.getCotisation(m.id, this.selectedMonth);
    });

    container.innerHTML = `
      <div class="card">
        <div class="field">
          <label>Mois sélectionné</label>
          <select id="month-select">
            ${Utils.MONTHS.map((mo,i) => {
              const key = `${year}-${String(i+1).padStart(2,'0')}`;
              return `<option value="${key}" ${this.selectedMonth===key?'selected':''}>${mo} ${year}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="flex-between">
          <span class="text-sm text-muted">Attendu ce mois</span>
          <span style="font-weight:700;">${Utils.fmtFCFA(totalDue)}</span>
        </div>
        <div class="flex-between mt-8">
          <span class="text-sm text-muted">Encaissé ce mois</span>
          <span style="font-weight:700;color:var(--green);">${Utils.fmtFCFA(totalPaid)}</span>
        </div>
        <div class="progress mt-8">
          <div class="progress__fill" style="width:${Math.min(100, totalDue?totalPaid/totalDue*100:0)}%;background:${totalPaid>=totalDue?'var(--green)':'var(--gold)'};"></div>
        </div>
      </div>

      <div class="section-title"><span class="ornament">💰</span> Paiements individuels</div>
      <div class="list">
        ${membres.map(m => {
          const due = Store.getCotisationDue(m);
          const paid = Store.getCotisation(m.id, this.selectedMonth);
          const isPaid = paid >= due;
          return `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
                <div class="list-row__subtitle">Dû : ${Utils.fmtFCFA(due)}</div>
              </div>
              <button class="btn sm ${isPaid?'sage':'secondary'}" data-toggle-cotis="${m.id}" data-due="${due}">
                ${isPaid ? '✅ Payé' : '☐ Marquer payé'}
              </button>
            </div>
          `;
        }).join('')}
      </div>
    `;

    container.querySelector('#month-select').addEventListener('change', (e) => {
      this.selectedMonth = e.target.value;
      this.renderCotisations(container);
    });

    container.querySelectorAll('[data-toggle-cotis]').forEach(btn => {
      btn.addEventListener('click', () => {
        const mid = btn.dataset.toggleCotis;
        const due = Number(btn.dataset.due);
        const current = Store.getCotisation(mid, this.selectedMonth);
        const newVal = current >= due ? 0 : due;
        Store.setCotisation(mid, this.selectedMonth, newVal);
        this.renderCotisations(container);
      });
    });
  },

  // ── OFFRANDES ──
  renderOffrandes(container, main) {
    const offrandes = Store.getOffrandes();
    const totalH = offrandes.reduce((s,o)=>s+Number(o.hommes||0),0);

    container.innerHTML = `
      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Offrandes Hommes</div>
          <div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--blue);">${Utils.fmtFCFA(totalH)}</div>
        </div>
        <div class="card center">
          <div class="text-sm text-muted">Offrandes Femmes</div>
          <div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--purple);">${Utils.fmtFCFA(totalF)}</div>
        </div>
      </div>
      <div class="card center" style="margin-top:0;">
        <div class="text-sm text-muted">Total Général</div>
        <div class="font-display" style="font-size:1.6rem;font-weight:700;color:var(--maroon);">${Utils.fmtFCFA(totalH+totalF)}</div>
      </div>
      <div id="offrande-list"></div>
    `;

    if (!offrandes.length) {
      container.querySelector('#offrande-list').innerHTML = `<div class="empty-state"><div class="empty-state__icon">🙏</div><div class="empty-state__text">Aucune offrande enregistrée</div></div>`;
    } else {
      container.querySelector('#offrande-list').innerHTML = `<div class="list">${offrandes.map(o => `
        <div class="list-row" data-id="${o.id}">
          <div class="list-row__avatar">🙏</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(o.occasion || 'Offrande')}</div>
            <div class="list-row__subtitle">${Utils.fmtDate(o.date)} · H: ${Utils.fmtFCFA(o.hommes)} / F: ${Utils.fmtFCFA(o.femmes)}</div>
          </div>
          <div class="list-row__meta" style="font-weight:700;">${Utils.fmtFCFA(Number(o.hommes||0)+Number(o.femmes||0))}</div>
        </div>
      `).join('')}</div>`;

      container.querySelectorAll('.list-row').forEach(row => {
        row.addEventListener('click', () => {
          Utils.confirmAction('Supprimer cette offrande ?', () => {
            Store.deleteOffrande(row.dataset.id);
            Utils.toast('Offrande supprimée');
            Router.render();
          });
        });
      });
    }

    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.innerHTML = '+';
    fab.id = 'fab-add-offrande';
    main.appendChild(fab);
    fab.addEventListener('click', () => this.openOffrandeForm());
  },

  openOffrandeForm() {
    const html = `
      <div class="field">
        <label>Date</label>
        <input type="date" id="of-date" value="${Utils.todayISO()}">
      </div>
      <div class="field">
        <label>Occasion</label>
        <input type="text" id="of-occasion" placeholder="Ex: Culte dimanche, Agape...">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Offrande Hommes (FCFA)</label>
          <input type="number" id="of-hommes" value="0" min="0" step="50">
        </div>
        <div class="field">
          <label>Offrande Femmes (FCFA)</label>
          <input type="number" id="of-femmes" value="0" min="0" step="50">
        </div>
      </div>
      <button class="btn primary block" id="save-offrande">💾 Enregistrer</button>
    `;
    const sheet = Utils.openSheet('Nouvelle offrande', html);
    sheet.querySelector('#save-offrande').addEventListener('click', () => {
      Store.addOffrande({
        id: Utils.genId('off'),
        date: sheet.querySelector('#of-date').value,
        occasion: sheet.querySelector('#of-occasion').value,
        hommes: Number(sheet.querySelector('#of-hommes').value),
        femmes: Number(sheet.querySelector('#of-femmes').value),
      });
      Utils.closeSheet();
      Utils.toast('Offrande ajoutée');
      Router.render();
    });
  },

  // ── MOUVEMENTS ──
  renderMouvements(container, main) {
    const mvts = Store.getMouvements();
    const entrees = mvts.filter(m=>m.type==='Entrée').reduce((s,m)=>s+Number(m.montant||0),0);
    const sorties = mvts.filter(m=>m.type==='Sortie').reduce((s,m)=>s+Number(m.montant||0),0);

    container.innerHTML = `
      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Entrées</div>
          <div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--green);">${Utils.fmtFCFA(entrees)}</div>
        </div>
        <div class="card center">
          <div class="text-sm text-muted">Sorties</div>
          <div class="font-display" style="font-size:1.3rem;font-weight:700;color:var(--red);">${Utils.fmtFCFA(sorties)}</div>

        const isEntree = m.type === 'Entrée';
        return `
          <div class="list-row" data-id="${m.id}">
            <div class="list-row__avatar">${isEntree?'⬆️':'⬇️'}</div>
            <div class="list-row__body">
              <div class="list-row__title">${Utils.escapeHtml(m.description || m.categorie)}</div>
              <div class="list-row__subtitle">${m.categorie} · ${Utils.fmtDate(m.date)}</div>
            </div>
            <div class="list-row__meta" style="font-weight:700;color:${isEntree?'var(--green)':'var(--red)'};">
