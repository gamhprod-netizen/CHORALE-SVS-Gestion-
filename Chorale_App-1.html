  // ── BILAN ──
  renderBilan(container) {
    const year = Store.data.meta.annee;
    const membres = Store.data.membres;

    // Annual cotisations
    let totalAttendu = 0, totalEncaisse = 0;
    const monthlyData = [];
    for (let mo=1; mo<=12; mo++) {
      const key = `${year}-${String(mo).padStart(2,'0')}`;
      let due=0, paid=0;
      membres.forEach(m => {
        due += Store.getCotisationDue(m);
        paid += Store.getCotisation(m.id, key);
      });
      totalAttendu += due; totalEncaisse += paid;
      monthlyData.push({ month: Utils.MONTHS[mo-1], due, paid });
    }
    const txGlobal = totalAttendu > 0 ? totalEncaisse/totalAttendu : 0;

    const offrandes = Store.getOffrandes();
    const totalOffrandes = offrandes.reduce((s,o)=>s+Number(o.hommes||0)+Number(o.femmes||0),0);

    const mvts = Store.getMouvements();
    const entrees = mvts.filter(m=>m.type==='Entrée').reduce((s,m)=>s+Number(m.montant||0),0);
    const sorties = mvts.filter(m=>m.type==='Sortie').reduce((s,m)=>s+Number(m.montant||0),0);
    const soldeNet = entrees - sorties;

    // Quarterly
    const quarters = [
      { label: 'T1 (Jan-Mar)', months: [0,1,2] },
      { label: 'T2 (Avr-Juin)', months: [3,4,5] },
      { label: 'T3 (Juil-Sep)', months: [6,7,8] },
      { label: 'T4 (Oct-Déc)', months: [9,10,11] },
    ];

    container.innerHTML = `
      <div class="card">
        <div class="flex-between">
          <span class="text-sm text-muted">Taux de recouvrement ${year}</span>
          <span class="font-display" style="font-size:1.4rem;font-weight:700;color:var(--maroon);">${Utils.pct(txGlobal)}</span>
        </div>
        <div class="progress mt-8"><div class="progress__fill" style="width:${txGlobal*100}%;background:var(--gold);"></div></div>
        <div class="flex-between mt-8 text-sm">
          <span class="text-muted">Attendu : ${Utils.fmtFCFA(totalAttendu)}</span>
          <span class="text-muted">Encaissé : ${Utils.fmtFCFA(totalEncaisse)}</span>
        </div>
      </div>

      <div class="grid-2">
        <div class="card center">
          <div class="text-sm text-muted">Total Offrandes</div>
          <div class="font-display" style="font-size:1.2rem;font-weight:700;color:var(--purple);">${Utils.fmtFCFA(totalOffrandes)}</div>
        </div>
        <div class="card center">
          <div class="text-sm text-muted">Solde Net</div>
          <div class="font-display" style="font-size:1.2rem;font-weight:700;color:${soldeNet>=0?'var(--green)':'var(--red)'};">${Utils.fmtFCFA(soldeNet)}</div>
        </div>
      </div>

      <div class="section-title"><span class="ornament">📅</span> Bilans Trimestriels</div>
      ${quarters.map(q => {
        const due = q.months.reduce((s,mi)=>s+monthlyData[mi].due,0);
        const paid = q.months.reduce((s,mi)=>s+monthlyData[mi].paid,0);
        const pct = due>0?paid/due:0;
        return `
          <div class="card">
            <div class="flex-between">
              <span style="font-weight:700;">${q.label}</span>
              <span style="font-weight:700;color:var(--maroon);">${Utils.fmtFCFA(paid)}</span>
            </div>
            <div class="progress mt-8"><div class="progress__fill" style="width:${pct*100}%;background:var(--sage);"></div></div>
            <div class="text-sm text-muted mt-8">${Utils.pct(pct)} de ${Utils.fmtFCFA(due)} attendu</div>
          </div>
        `;
      }).join('')}

      <div class="section-title"><span class="ornament">📈</span> Détail mensuel</div>
      <div class="scroll-table">
        <table>
          <thead><tr><th>Mois</th><th>Attendu</th><th>Encaissé</th><th>Taux</th></tr></thead>
          <tbody>
            ${monthlyData.map(md => `
              <tr>
                <td>${md.month}</td>
                <td>${Utils.fmtFCFA(md.due)}</td>
                <td style="color:var(--green);font-weight:700;">${Utils.fmtFCFA(md.paid)}</td>
                <td>${Utils.pct(md.due?md.paid/md.due:0)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  },
};

// ===== MODULE: SECRETARIAT =====
// ════════════════════════════════════════════════════════════════
// SECRÉTARIAT — Activités, Modérateurs, Jeux d'Anges
// ════════════════════════════════════════════════════════════════

const SecretariatModule = {
  tab: 'activites',

  render(main) {
    const tabs = [
      { key: 'activites', label: '📅 Activités' },
      { key: 'moderateurs', label: '🎤 Modérateurs' },
      { key: 'jda', label: "😇 Jeux d'Anges" },

    main.innerHTML = `
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="secre-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => { this.tab = btn.dataset.tab; this.render(main); });

    if (this.tab === 'activites') this.renderActivites(content, main);

  // ── ACTIVITÉS ──
  renderActivites(container, main) {
    const activites = Store.getActivites();
    const realisees = activites.filter(a=>a.statut==='Réalisée').length;
    const prevues = activites.filter(a=>a.statut==='Prévue').length;

    container.innerHTML = `
      <div class="grid-2">
        <div class="card center">
          <div class="kpi-card__value" style="color:var(--green);">${realisees}</div>
          <div class="kpi-card__label">Réalisées</div>
        </div>

// ===== MODULE: DIRECTION =====
// ════════════════════════════════════════════════════════════════
// DIRECTION TECHNIQUE — Répertoire, Évaluations, Intégrants, Tests
// ════════════════════════════════════════════════════════════════

const DirectionModule = {
  tab: 'evaluations',

  CRIT_EVAL: [
    'Exécution sans paroles','Justesse vocale','Lecture de portée','Respect tonalité',
    'Respect rythme','Harmonie pupitre','Maintien de voix',"Capacité d'écoute",
    'Reproduction mélodie','Adaptation modulations','Présence scénique','Assurance',
    'Travail personnel','Discipline musicale'
  ],
  CRIT_TEST: [
    'Chant sans paroles','Justesse','Lecture portée','Interprétation','Modulations',
    'Harmonie','Maintien voix','Rythme','Reproduction mélodie','Retrouver sa note','Assurance'
  ],

  render(main) {
    const tabs = [
      { key: 'evaluations', label: '⭐ Évaluations' },
      { key: 'repertoire', label: '🎵 Répertoire' },
      { key: 'integrants', label: '🔍 Intégrants' },
    ];

    main.innerHTML = `
      <div class="tabbar">
        ${tabs.map(t => `<button class="tab-btn ${this.tab===t.key?'active':''}" data-tab="${t.key}">${t.label}</button>`).join('')}
      </div>
      <div id="dt-content"></div>
    `;

    main.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => { this.tab = btn.dataset.tab; this.render(main); });
    });

    const content = main.querySelector('#dt-content');
    if (this.tab === 'evaluations') this.renderEvaluations(content);
    else if (this.tab === 'repertoire') this.renderRepertoire(content, main);
    else this.renderIntegrants(content);
  },

  // ── ÉVALUATIONS MUSICALES ──
  renderEvaluations(container) {
    const choristes = Store.data.membres.filter(m=>m.statut==='Choriste').sort((a,b)=>a.nom.localeCompare(b.nom));

    let sumMoy = 0, count = 0;
    const rows = choristes.map(m => {
      const ev = Store.getEvaluation(m.id);
      let moy = 0;
      if (ev && ev.notes) {
        const vals = Object.values(ev.notes);
        moy = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
      }
      sumMoy += moy; count++;
      return { membre: m, moy };
    });
    const moyChorale = count ? sumMoy/count : 0;

    container.innerHTML = `
      <div class="card center">
        <div class="text-sm text-muted">Moyenne musicale de la chorale</div>
        <div class="font-display" style="font-size:1.8rem;font-weight:700;color:var(--maroon);">${moyChorale.toFixed(1)}<span style="font-size:1rem;color:var(--ink-soft);">/20</span></div>
      </div>
      <div class="list">
        ${rows.sort((a,b)=>b.moy-a.moy).map(r => {
          const niveau = this.niveauLabel(r.moy);
          return `
            <div class="list-row" data-id="${r.membre.id}">
              <div class="list-row__avatar">${Utils.initials(r.membre.nom)}</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(r.membre.nom)}</div>
                <div class="list-row__subtitle">${r.membre.pupitre || '—'}</div>
              </div>
              <div class="list-row__meta">
                <div style="font-weight:700;font-size:1rem;">${r.moy.toFixed(1)}/20</div>
                <div class="text-sm">${niveau}</div>
              </div>
              <span class="list-row__chevron">›</span>
            </div>
          `;
        }).join('')}
      </div>
    `;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openEvaluationForm(row.dataset.id));
    });
  },

  niveauLabel(moy) {
    if (moy >= 18) return '🌟 Excellent';
    if (moy >= 15) return '⭐ Très bon';
    if (moy >= 12) return '✔️ Bon';
    if (moy >= 10) return '⚠️ Moyen';
    return '🔴 À améliorer';
  },

  openEvaluationForm(membreId) {
    const m = Store.getMembre(membreId);
    const ev = Store.getEvaluation(membreId) || { notes: {} };

    const html = `
      <div class="text-sm text-muted" style="margin-bottom:10px;">Notation de 0 à 20 pour chaque critère</div>
      ${this.CRIT_EVAL.map((crit, i) => {
        const val = ev.notes[crit] !== undefined ? ev.notes[crit] : 10;
        return `
          <div class="field">
            <label>${crit} <span style="float:right;font-weight:700;color:var(--maroon);" id="val-${i}">${val}</span></label>
            <input type="range" min="0" max="20" step="1" value="${val}" data-crit="${Utils.escapeHtml(crit)}" data-idx="${i}" style="width:100%;">
          </div>
        `;
      }).join('')}
      <div class="card center mt-8">
        <div class="text-sm text-muted">Moyenne</div>
        <div class="font-display" id="eval-avg" style="font-size:1.5rem;font-weight:700;color:var(--maroon);">0.0/20</div>
      </div>
      <button class="btn primary block mt-16" id="save-eval">💾 Enregistrer l'évaluation</button>
    `;

    const sheet = Utils.openSheet(`⭐ ${m.nom}`, html);

    const updateAvg = () => {
      const sliders = sheet.querySelectorAll('[data-crit]');
      let sum = 0;
      sliders.forEach(s => sum += Number(s.value));
      const avg = sum / sliders.length;
      sheet.querySelector('#eval-avg').textContent = avg.toFixed(1) + '/20';
    };

    sheet.querySelectorAll('[data-crit]').forEach(slider => {
      slider.addEventListener('input', () => {
        sheet.querySelector('#val-' + slider.dataset.idx).textContent = slider.value;
        updateAvg();
      });
    });
    updateAvg();

    sheet.querySelector('#save-eval').addEventListener('click', () => {
      const notes = {};
      sheet.querySelectorAll('[data-crit]').forEach(s => { notes[s.dataset.crit] = Number(s.value); });
      Store.setEvaluation(membreId, { notes, date: Utils.todayISO() });
      Utils.closeSheet();
      Utils.toast('Évaluation enregistrée');
      Router.render();
    });
  },

  renderIntegrants(container) {
    const integrants = Store.data.membres.filter(m=>m.statut==='Intégrant').sort((a,b)=>a.nom.localeCompare(b.nom));

    if (!integrants.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state__icon">🔍</div><div class="empty-state__text">Aucun intégrant enregistré</div></div>`;
      return;
    }

    container.innerHTML = `<div class="list">${integrants.map(m => {
      const dis = Store.getDisciplineStats(m.id);
      const test = Store.getTestIntegration(m.id);
      let result = '⏳ En observation';
      let pillClass = 'integrant';
      if (test && test.moyenne) {
        if (test.moyenne >= 10) { result = '✅ Admis'; pillClass = 'actif'; }
        else { result = '❌ Refusé'; pillClass = 'suspendu'; }
      } else if (dis.total >= 2 && dis.txSamedi >= 0.7) {
        result = '✅ Éligible au test';
        pillClass = 'actif';
      }
      return `
        <div class="list-row" data-id="${m.id}">
          <div class="list-row__avatar">${Utils.initials(m.nom)}</div>
          <div class="list-row__body">
            <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
            <div class="list-row__subtitle">Tx présence : ${Utils.pct(dis.txSamedi)} · ${dis.total} séances</div>
          </div>
          <span class="pill ${pillClass}">${result}</span>
        </div>
      `;
    }).join('')}</div>`;

    container.querySelectorAll('.list-row').forEach(row => {
      row.addEventListener('click', () => this.openTestForm(row.dataset.id));
    });
  },

  openTestForm(membreId) {
    const m = Store.getMembre(membreId);
    const test = Store.getTestIntegration(membreId) || { notes: {} };

    const html = `
      <div class="text-sm text-muted" style="margin-bottom:10px;">Test d'intégration — Notation de 0 à 20</div>
      ${this.CRIT_TEST.map((crit, i) => {
        const val = test.notes[crit] !== undefined ? test.notes[crit] : 10;
        return `
          <div class="field">
            <label>${crit} <span style="float:right;font-weight:700;color:var(--maroon);" id="tval-${i}">${val}</span></label>
            <input type="range" min="0" max="20" step="1" value="${val}" data-tcrit="${Utils.escapeHtml(crit)}" data-tidx="${i}" style="width:100%;">
          </div>
        `;
      }).join('')}
      <div class="card center mt-8">
        <div class="text-sm text-muted">Moyenne</div>
        <div class="font-display" id="test-avg" style="font-size:1.5rem;font-weight:700;color:var(--maroon);">0.0/20</div>
        <div class="text-sm mt-8" id="test-result">—</div>
      </div>
      <button class="btn primary block mt-16" id="save-test">💾 Enregistrer le test</button>
    `;

    const sheet = Utils.openSheet(`📝 Test — ${m.nom}`, html);

    const updateAvg = () => {
      const sliders = sheet.querySelectorAll('[data-tcrit]');
      let sum = 0;
      sliders.forEach(s => sum += Number(s.value));
      const avg = sum / sliders.length;
      sheet.querySelector('#test-avg').textContent = avg.toFixed(2) + '/20';
      const resultEl = sheet.querySelector('#test-result');
      if (avg >= 10) {
        resultEl.innerHTML = '<span class="pill actif">✅ ADMIS (≥10/20)</span>';
      } else {
        resultEl.innerHTML = '<span class="pill suspendu">❌ REFUSÉ (&lt;10/20)</span>';
      }
    };

    sheet.querySelectorAll('[data-tcrit]').forEach(slider => {
      slider.addEventListener('input', () => {
        sheet.querySelector('#tval-' + slider.dataset.tidx).textContent = slider.value;
        updateAvg();
      });
    });
    updateAvg();

    sheet.querySelector('#save-test').addEventListener('click', () => {
      const notes = {};
      sheet.querySelectorAll('[data-tcrit]').forEach(s => { notes[s.dataset.tcrit] = Number(s.value); });
      const vals = Object.values(notes);
      const moyenne = vals.reduce((a,b)=>a+b,0)/vals.length;
      Store.setTestIntegration(membreId, { notes, moyenne, date: Utils.todayISO() });

      if (moyenne >= 10) {
        Utils.closeSheet();
        Utils.confirmAction(`${m.nom} est admis avec ${moyenne.toFixed(2)}/20. Le faire passer au statut <b>Choriste</b> ?`, () => {
          const newId = Store.nextMemberId('Choriste');
          Store.deleteMembre(membreId);
          m.statut = 'Choriste';
          m.id = newId;
          Store.upsertMembre(m);
          Utils.toast(`${m.nom} est maintenant Choriste !`);
          Router.render();
        });
      } else {
        Utils.closeSheet();
        Utils.toast('Test enregistré');
        Router.render();
      }
    });
  },
};

// ANNIVERSAIRES — Alertes et calendrier

const AnniversairesModule = {
  render(main) {
    const membres = Store.data.membres;
    const withDates = membres.filter(m => m.dateNaissance);
    const withoutDates = membres.filter(m => !m.dateNaissance);

    const today = [], week = [], byMonth = {};
    Utils.MONTHS.forEach(m => byMonth[m] = []);

    withDates.forEach(m => {
      const info = Store.getAnniversaireInfo(m);
      if (info.isToday) today.push(m);
      else if (info.isThisWeek) week.push({ m, info });
      const dob = new Date(m.dateNaissance);
      byMonth[Utils.MONTHS[dob.getMonth()]].push(m);
    });

    week.sort((a,b) => a.info.daysRemaining - b.info.daysRemaining);

    main.innerHTML = `
      ${today.length ? `
        <div class="alert-banner gold">
          <div class="alert-banner__icon">🎉</div>
          <div><b>Aujourd'hui :</b> ${today.map(m=>m.nom).join(', ')}</div>
        </div>` : `
        <div class="alert-banner info">
          <div class="alert-banner__icon">📅</div>
          <div>Aucun anniversaire aujourd'hui.</div>
        </div>`}

      <div class="section-title"><span class="ornament">📅</span> Dans les 7 prochains jours</div>
      ${week.length ? `
        <div class="list">
          ${week.map(({m,info}) => `
            <div class="list-row" style="cursor:default;">
              <div class="list-row__avatar">🎂</div>
              <div class="list-row__body">
                <div class="list-row__title">${Utils.escapeHtml(m.nom)}</div>
                <div class="list-row__subtitle">${Utils.fmtDate(m.dateNaissance)} → ${info.age+1} ans</div>
              </div>
              <div class="pill bureau">Dans ${info.daysRemaining}j</div>
            </div>
          `).join('')}

      <div class="section-title"><span class="ornament">📆</span> Calendrier par mois</div>

        ${Utils.MONTHS.map((mo, idx) => {

// ===== MODULE: RAPPORTS =====
// ════════════════════════════════════════════════════════════════
// RAPPORTS — Génération automatique
// ════════════════════════════════════════════════════════════════

const RapportsModule = {
  render(main) {
    const d = Store.data;
    const membres = d.membres;
    const choristes = membres.filter(m=>m.statut==='Choriste');
    const integrants = membres.filter(m=>m.statut==='Intégrant');
    const year = d.meta.annee;

    // R1 — Synthèse générale
    const effectifTotal = membres.length;
    const effectifActif = membres.filter(m=>m.situation==='Actif').length;
    const activitesRealisees = d.activites.filter(a=>a.statut==='Réalisée').length;
    const repetitionsTenues = d.repetitions.filter(r=>r.statut==='Tenue').length;
    const chantsMaitrises = d.repertoire.filter(c=>c.statut==='Maîtrisé').length;

    // R2 — Discipline
    let sumTxSam=0, sumTxDim=0, interdits=0, n=0;
    let interditsNames = [];
    membres.forEach(m => {
      const dis = Store.getDisciplineStats(m.id);
      sumTxSam += dis.txSamedi; sumTxDim += dis.txDimanche; n++;
      if (dis.interdit) { interdits++; interditsNames.push(m.nom); }
    });
    const txSamMoy = n?sumTxSam/n:0, txDimMoy = n?sumTxDim/n:0;
    const sanctionsCount = d.sanctions.length;

    // R3 — Financier
    let totalDue=0, totalPaid=0, membresAJour=0, membresRetard=0;
    membres.forEach(m => {
      const due = Store.getCotisationDue(m)*12;
      let paid = 0;
      for(let mo=1;mo<=12;mo++) paid += Store.getCotisation(m.id, `${year}-${String(mo).padStart(2,'0')}`);
      totalDue += due; totalPaid += paid;
      if (paid >= due) membresAJour++; else membresRetard++;
    });
    const arrears = totalDue - totalPaid;
    const txRecouvrement = totalDue?totalPaid/totalDue:0;
    const offrandes = d.offrandes.reduce((s,o)=>s+Number(o.hommes||0)+Number(o.femmes||0),0);
    const mvts = d.mouvements;
    const entrees = mvts.filter(m=>m.type==='Entrée').reduce((s,m)=>s+Number(m.montant||0),0);
    const sorties = mvts.filter(m=>m.type==='Sortie').reduce((s,m)=>s+Number(m.montant||0),0);

    // R4 — Technique
    let sumMoyMusicale=0, nMus=0;
    let nivCounts = { excellent:0, tresbon:0, bon:0, ameliorer:0 };
    choristes.forEach(m => {
      const ev = Store.getEvaluation(m.id);
      let moy = 0;
      if (ev && ev.notes) {
        const vals = Object.values(ev.notes);
        moy = vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
      }
      sumMoyMusicale += moy; nMus++;
      if (moy>=18) nivCounts.excellent++;
      else if (moy>=15) nivCounts.tresbon++;
      else if (moy>=12) nivCounts.bon++;
      else if (moy<10) nivCounts.ameliorer++;
    });
    const moyMusicaleChorale = nMus?sumMoyMusicale/nMus:0;
    const chantsEnCours = d.repertoire.filter(c=>c.statut==='En cours').length;

    // R5 — Intégrants
    let eligibles=0, admis=0, refuses=0;
    integrants.forEach(m => {
      const dis = Store.getDisciplineStats(m.id);
      const test = Store.getTestIntegration(m.id);
      if (test && test.moyenne!=null) {
        if (test.moyenne>=10) admis++; else refuses++;
      } else if (dis.total>=2 && dis.txSamedi>=0.7) eligibles++;
    });

    // R6 — Anniversaires
    let annivToday=[], annivWeek=0, annivMonth=[];
    membres.forEach(m => {
      const info = Store.getAnniversaireInfo(m);
      if (!info) return;
      if (info.isToday) annivToday.push(m.nom);
      if (info.isThisWeek && !info.isToday) annivWeek++;
      if (info.isThisMonth) annivMonth.push(m.nom);
    });

    // R7 — IGI
    let igiSum=0, igiN=0, exemplaires=0, tresImpliques=0, accompagner=0;
    choristes.forEach(m => {
      const igi = Store.calcIGI(m.id);
      if (igi) {
        igiSum += igi.igi; igiN++;
        if (igi.categorie.includes('Exemplaire')) exemplaires++;
        if (igi.categorie.includes('Très impliqué')) tresImpliques++;
        if (igi.categorie.includes('accompagner')) accompagner++;
      }
    });
    const igiMoyen = igiN?igiSum/igiN:0;

    main.innerHTML = `
      <div class="card center">
        <div class="font-display" style="font-size:1.1rem;font-weight:700;color:var(--maroon);">📈 Rapport Automatique</div>
        <div class="text-sm text-muted">Année ${year} — Généré le ${Utils.fmtDate(Utils.todayISO())}</div>
      </div>

      <div class="section-title"><span class="ornament">📋</span> 1. Synthèse générale</div>
      <div class="card">
        ${this.row('Effectif total inscrit', effectifTotal)}
        ${this.row('Membres actifs', effectifActif)}
        ${this.row('Choristes', choristes.length)}
        ${this.row('Intégrants en cours', integrants.length)}
        ${this.row('Activités réalisées', activitesRealisees)}
        ${this.row('Répétitions tenues', repetitionsTenues)}
        ${this.row('Chants maîtrisés', chantsMaitrises)}
      </div>

      <div class="section-title"><span class="ornament">⚖️</span> 2. Rapport disciplinaire</div>
      <div class="card">
        ${this.row('Taux présence moyen — Samedis', Utils.pct(txSamMoy))}
        ${this.row('Taux présence moyen — Dimanches', Utils.pct(txDimMoy))}
        ${this.row('Membres interdits de prestation', interdits, interdits>0?'var(--red)':null)}
        ${this.row('Sanctions financières émises', sanctionsCount)}
      </div>
      ${interdits>0 ? `
        <div class="alert-banner danger">
          <div class="alert-banner__icon">⛔</div>
          <div><b>Interdits :</b> ${interditsNames.join(', ')}</div>
        </div>` : ''}

      <div class="section-title"><span class="ornament">💰</span> 3. Rapport financier</div>
      <div class="card">
        ${this.row('Cotisations attendues (annuel)', Utils.fmtFCFA(totalDue))}
        ${this.row('Cotisations encaissées', Utils.fmtFCFA(totalPaid))}

        <button class="btn secondary block" id="export-data">📤 Exporter (JSON)</button>
        <button class="btn ghost block" id="import-data">📥 Importer</button>
      </div>

      <input type="file" id="import-file" accept=".json" style="display:none;">

    main.querySelector('#export-data').addEventListener('click', () => this.exportData());
    main.querySelector('#import-data').addEventListener('click', () => main.querySelector('#import-file').click());
    main.querySelector('#import-file').addEventListener('change', (e) => this.importData(e));
    main.querySelector('#reset-data').addEventListener('click', () => {
      Utils.confirmAction('⚠️ <b>Toutes les données seront effacées</b> et remplacées par les données initiales. Cette action est irréversible. Continuer ?', () => {
        Store.resetAll();
        Utils.toast('Données réinitialisées');
        Router.navigate('dashboard');
      });
    });
  },

  row(label, value, color) {
    return `<div class="flex-between" style="padding:6px 0;border-bottom:1px solid var(--line);">
      <span class="text-sm text-muted">${label}</span>
      <span style="font-weight:700;${color?'color:'+color+';':''}">${value}</span>
    </div>`;
  },

  exportData() {
    const json = Store.exportJSON();
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `chorale_export_${Utils.todayISO()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    Utils.toast('Export téléchargé');
  },

  importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      Utils.confirmAction('Importer ce fichier remplacera toutes les données actuelles. Continuer ?', () => {
        const ok = Store.importJSON(evt.target.result);
        if (ok) {
          Utils.toast('Données importées avec succès');
          Router.navigate('dashboard');
        } else {
          Utils.toast('Erreur : fichier invalide');
        }
      });
    };
    reader.readAsText(file);
  },
};

function buildApp() {

function showUserMenu() {
  const html = `
    <div class="card center">
      <div class="list-row__avatar" style="width:54px;height:54px;font-size:1.3rem;margin:0 auto 8px;">${currentUser.email[0].toUpperCase()}</div>

      <div class="text-sm text-muted mt-8">Connecté · Données synchronisées en temps réel</div>
    </div>
    <button class="btn danger block mt-16" id="logout-btn">🚪 Se déconnecter</button>
  `;
  const sheet = Utils.openSheet('👤 Mon compte', html);
  sheet.querySelector('#logout-btn').addEventListener('click', async () => {
    Utils.closeSheet();
    await FirebaseAPI.signOut();
  });
}

function setSyncStatus(status) {
  // status: 'synced' | 'syncing' | 'offline'
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (!dot || !label) return;
  dot.classList.remove('offline', 'syncing');
  if (status === 'offline') {
    dot.classList.add('offline');
    label.textContent = 'Hors ligne';
  } else if (status === 'syncing') {
    dot.classList.add('syncing');
    label.textContent = 'Synchronisation...';
  } else {
    label.textContent = 'Synchronisé';
  }
}

// ── Re-render on remote data changes ──
function onRemoteDataUpdate() {
  setSyncStatus('synced');
  if (Router.current) {
    Router.render();
  }
}

// ── Network status ──
window.addEventListener('online', () => setSyncStatus('synced'));
window.addEventListener('offline', () => setSyncStatus('offline'));

// ── App bootstrap ──
async function startApp(user) {
  currentUser = user;
  Utils.openSheet && Utils.closeSheet();

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">🎵</div>
        <div class="auth-title">Chargement...</div>
        <div class="auth-subtitle">Synchronisation des données en cours</div>
      </div>
    </div>
  `;

  try {
    Store._onRemoteUpdate = onRemoteDataUpdate;
    await Store.init(FirebaseAPI.db, FirebaseAPI.helpers);
    buildApp();
    setSyncStatus(navigator.onLine ? 'synced' : 'offline');
  } catch (e) {
    console.error(e);
    app.innerHTML = `
      <div class="auth-screen">
        <div class="auth-card">
          <div class="auth-logo">⚠️</div>
          <div class="auth-title">Erreur de connexion</div>
          <div class="auth-subtitle">Impossible de charger les données. Vérifiez votre connexion internet et réessayez.</div>
          <button class="btn primary block" onclick="location.reload()">Réessayer</button>
        </div>
      </div>
    `;
  }
}

function showLogin() {
  const app = document.getElementById('app');
  app.innerHTML = '<div id="auth-container"></div>';
  AuthUI.render(document.getElementById('auth-container'), {
    signIn: FirebaseAPI.signIn,
    signUp: FirebaseAPI.signUp,
    resetPassword: FirebaseAPI.resetPassword,
  });
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  // Wait briefly for the module script to register window.FirebaseAPI
  const maxWait = 5000;
  const start = Date.now();
  while (!window.FirebaseAPI && (Date.now() - start) < maxWait) {
    await new Promise(r => setTimeout(r, 50));
  }

  if (!window.FirebaseAPI) {
    document.getElementById('app').innerHTML = `
      <div class="auth-screen">
        <div class="auth-card">
          <div class="auth-logo">⚠️</div>
          <div class="auth-title">Connexion impossible</div>
          <div class="auth-subtitle">
            Le script de l'application n'a pas pu être chargé. Rechargez la page.
          </div>
          <button class="btn primary block" onclick="location.reload()">Réessayer</button>
        </div>
      </div>
    `;
    return;
  }

  try {
    await FirebaseAPI.init(FIREBASE_CONFIG);
  } catch (e) {
    console.error('Firebase init error', e);
    document.getElementById('app').innerHTML = `
      <div class="auth-screen">
        <div class="auth-card">
          <div class="auth-logo">⚠️</div>
          <div class="auth-title">Erreur de connexion</div>
          <div class="auth-subtitle">
            Impossible de charger Firebase (vérifiez votre connexion internet — l'accès à
            <b>gstatic.com</b> et <b>googleapis.com</b> est requis).<br><br>
            <span style="font-size:0.7rem;opacity:0.7;">${Utils.escapeHtml(e.message || String(e))}</span>
          </div>
          <button class="btn primary block" onclick="location.reload()">Réessayer</button>
        </div>
      </div>
    `;
    return;
  }

  FirebaseAPI.onAuthStateChanged((user) => {
    if (user) {
      startApp(user);
    } else {
      if (Store._unsubscribe) { Store._unsubscribe(); Store._unsubscribe = null; }
      Store._ready = false;
      Store.data = null;
      showLogin();
    }
  });
});
